<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Burger AR</title>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body style="margin:0;">
<model-viewer src="burger_realistic_free.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate style="width:100vw; height:100vh;">
<button slot="ar-button" style="background:#ff6a00; color:white; border:0; padding:15px 25px; border-radius:20px; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:16px;">View in your space</button>
</model-viewer>
</body>
</html>
